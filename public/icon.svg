<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        rect { fill: #1e3a8a; }
        path { stroke: #ffffff; }
      }
      @media (prefers-color-scheme: dark) {
        rect { fill: #1e3a8a; }
        path { stroke: #ffffff; }
      }
    </style>
  </defs>
  <!-- Navy blue background -->
  <rect width="512" height="512" fill="#1e3a8a"/>
  
  <!-- Checkmark for task completion -->
  <path d="M 140 280 L 230 370 L 390 140" stroke="#ffffff" stroke-width="60" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Subtle overlay for depth -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.12" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#grad)"/>
</svg>
